<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense &amp; Budget Visualizer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <div class="header-title">
        <span class="header-emoji">💸</span>
        <h1>Budget Visualizer</h1>
      </div>
      <button id="theme-toggle">🌙 Dark Mode</button>
    </div>
  </header>

  <main>

    <!-- Balance Display -->
    <section id="balance-section" class="glass-card text-center">
      <p class="section-label">✨ Total Spent</p>
      <p id="balance-display">$0.00</p>
      <p class="balance-sub">Keep track of every penny 🌸</p>
    </section>

    <!-- Input Form -->
    <section id="form-section" class="glass-card">
      <p class="section-label">➕ Add Transaction</p>
      <form id="transaction-form">
        <div class="field-group">
          <input type="text" id="item-name" placeholder="✏️  Item name" />
          <span id="error-name" class="error"></span>
        </div>
        <div class="field-group">
          <input type="number" id="item-amount" placeholder="💰  Amount (Rp)" min="0.01" step="1" />
          <span id="error-amount" class="error"></span>
        </div>
        <div class="field-group">
          <select id="item-category">
            <option value="">🏷️  Select category</option>
            <option value="Food">🍰 Food</option>
            <option value="Transport">🚗 Transport</option>
            <option value="Fun">🎀 Fun</option>
          </select>
          <span id="error-category" class="error"></span>
        </div>
        <button type="submit" class="btn-primary">Add Transaction 🌷</button>
      </form>
    </section>

    <!-- Spending Limit & Sort side by side on wider screens -->
    <div class="two-col">
      <section id="limit-section" class="glass-card">
        <p class="section-label">🚨 Spending Limit</p>
        <label for="spending-limit" class="field-label">Set a limit ($)</label>
        <input type="number" id="spending-limit" placeholder="e.g. 500000" min="0" step="1" />
      </section>

      <section id="sort-section" class="glass-card">
        <p class="section-label">🔀 Sort By</p>
        <label for="sort-select" class="field-label">Order transactions</label>
        <select id="sort-select">
          <option value="none">None</option>
          <option value="amount-asc">Amount (Low → High)</option>
          <option value="amount-desc">Amount (High → Low)</option>
          <option value="category-asc">Category (A → Z)</option>
        </select>
      </section>
    </div>

    <!-- Transaction List -->
    <section id="list-section" class="glass-card">
      <p class="section-label">📋 Transactions</p>
      <ul id="transaction-list"></ul>
      <p id="empty-state" class="hidden empty-msg">No transactions yet — go treat yourself! 🛍️</p>
    </section>

    <!-- Chart -->
    <section id="chart-section" class="glass-card">
      <p class="section-label">🍩 Spending by Category</p>
      <div class="chart-wrap">
        <canvas id="spending-chart"></canvas>
      </div>
      <p id="chart-empty" class="hidden empty-msg">Add transactions to see the chart 🌈</p>
    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
